<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUMU ART GALLERY</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>MUMU ART GALLERY</h1>
        <p class="subtitle">刻 - 돌과 나무</p>
    </header>

    <main>
        <div class="section-group">
            <section>
                <h2>🎨 작품 - 전각</h2>
                <div id="gallery-work-seal" class="gallery"></div>
            </section>

            <section>
                <h2>🪵 작품 - 서각</h2>
                <div id="gallery-work-wood" class="gallery"></div>
            </section>
        </div>

        <div class="section-group">
            <section>
                <h2>📖 배움 - 전각</h2>
                <div id="gallery-lesson-seal" class="gallery"></div>
            </section>

            <section>
                <h2>🏫 배움 - 서각</h2>
                <div id="gallery-lesson-wood" class="gallery"></div>
            </section>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 MUMU-WEB-APP. All rights reserved.</p>
    </footer>

    <div id="photoModal" class="modal">
        <span class="close">&times;</span>
        <img class="modal-content" id="modalImg">
    </div>

    <script src="script.js"></script>
</body>
</html>
